  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .card {
      background: #fff;
      border-radius: 24px;
      padding: 40px 36px 32px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.5);
      text-align: center;
      width: 340px;
    }
    .logo-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 6px;
    }
    .logo-icon {
      width: 36px; height: 36px;
      background: #ff0050;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .brand { font-size: 22px; font-weight: 700; color: #1a1a1a; }
    .subtitle { color: #888; font-size: 13px; margin-bottom: 28px; }
    .qr-box {
      background: #f8f8f8;
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 20px;
      position: relative;
    }
    .qr-img {
      width: 220px; height: 220px;
      display: block; margin: 0 auto;
      image-rendering: pixelated;
    }
    .corner {
      position: absolute;
      width: 20px; height: 20px;
      border-color: #ff0050;
      border-style: solid;
    }
    .corner.tl { top:10px; left:10px; border-width:3px 0 0 3px; }
    .corner.tr { top:10px; right:10px; border-width:3px 3px 0 0; }
    .corner.bl { bottom:10px; left:10px; border-width:0 0 3px 3px; }
    .corner.br { bottom:10px; right:10px; border-width:0 3px 3px 0; }
    .tip { color: #555; font-size: 14px; margin-bottom: 6px; }
    .tip strong { color: #ff0050; }
    .steps {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin: 16px 0;
      font-size: 12px;
      color: #999;
    }
    .step { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .step-num {
      width: 22px; height: 22px;
      background: #ff0050;
      color: white;
      border-radius: 50%;
      font-size: 11px;
      font-weight: 700;
      display: flex; align-items: center; justify-content: center;
    }
    .warning {
      background: #fff8e1;
      border: 1px solid #ffe082;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12px;
      color: #f57c00;
      margin-top: 14px;
    }
    .ts { color: #ccc; font-size: 11px; margin-top: 14px; }
  </style>
